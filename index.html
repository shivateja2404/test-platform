<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TSPSC Group 1 Test Prep</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
::-webkit-scrollbar{
width:8px;
}

::-webkit-scrollbar-thumb{
background:#475569;
border-radius:10px;
}

.question-option{
    background:#1e293b;
    border:1px solid #475569;
    color:#f8fafc;
    transition:all .2s ease;
}

.question-option:hover{
    background:#334155;
}

.question-option.selected{
    background:#2563eb;
    border:2px solid #60a5fa;
    color:white;
}

.correct{
    background:#166534 !important;
    border-color:#22c55e !important;
    color:white !important;
}

.wrong{
    background:#991b1b !important;
    border-color:#ef4444 !important;
    color:white !important;
}

.question-text{
    white-space:pre-line;
    line-height:1.8;
}

.correct{
background:#dcfce7 !important;
border-color:#22c55e !important;
}

.wrong{
background:#fee2e2 !important;
border-color:#ef4444 !important;
}
</style>

</head>
<body class="bg-slate-900 text-white min-h-screen">

<div id="app"></div>

<script>

let questions=[];
let currentQuestion=0;
let answers={};
let visited={};
let reviewMarked={};

let timerInterval;
let totalSeconds=0;
let remainingSeconds=0;

function formatTime(sec){
const h=Math.floor(sec/3600);
const m=Math.floor((sec%3600)/60);
const s=sec%60;

return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function landingPage(){

document.getElementById("app").innerHTML=`

<div class="max-w-6xl mx-auto p-6">

<div class="text-center mb-8">
<h1 class="text-4xl font-bold text-blue-400">
TSPSC Group 1 Test Prep Platform
</h1>

<p class="text-slate-400 mt-3">
Paste extracted JSON questions and start practice instantly.
</p>
</div>

<div class="bg-slate-800 rounded-xl p-6 shadow-xl">

<label class="font-semibold">
Paste Question JSON
</label>

<textarea
id="jsonInput"
class="w-full h-96 mt-3 bg-slate-900 border border-slate-700 rounded-lg p-4"
placeholder='Paste JSON Array Here'>
</textarea>

<div class="grid md:grid-cols-2 gap-4 mt-4">

<div>
<label>Minutes Per Question</label>
<input
id="minutesPerQuestion"
type="number"
value="1"
class="w-full p-3 rounded bg-slate-900 border border-slate-700 mt-1">
</div>

<div class="flex items-end">
<button
onclick="startTest()"
class="w-full bg-blue-600 hover:bg-blue-700 p-3 rounded font-semibold">
Start Test
</button>
</div>

</div>

</div>

<div class="mt-8 bg-slate-800 rounded-xl p-5">

<h2 class="text-xl font-bold mb-3">
Expected JSON Schema
</h2>

<pre class="text-sm overflow-auto text-green-300">
[
 {
   "id":"q1",
   "topic":"Telangana History",
   "question":"Question text",
   "options":[
      {"key":"A","text":"Option A"},
      {"key":"B","text":"Option B"},
      {"key":"C","text":"Option C"},
      {"key":"D","text":"Option D"}
   ],
   "correctAnswer":"B",
   "explanation":"Explanation"
 }
]
</pre>

</div>

</div>
`;
}

function startTest(){

try{

questions=JSON.parse(
document.getElementById("jsonInput").value
);

if(!Array.isArray(questions)||questions.length===0){
alert("Invalid JSON");
return;
}

}
catch(e){
alert("JSON Parsing Error");
return;
}

answers={};
visited={};
reviewMarked={};

const mpq=parseInt(
document.getElementById("minutesPerQuestion").value||1
);

totalSeconds=questions.length*mpq*60;
remainingSeconds=totalSeconds;

renderTest();

timerInterval=setInterval(()=>{

remainingSeconds--;

document.getElementById("timer").innerText=
formatTime(remainingSeconds);

if(remainingSeconds<=0){
clearInterval(timerInterval);
submitTest();
}

},1000);

}

function navColor(i){

if(reviewMarked[i]) return "bg-purple-600";

if(answers[i]) return "bg-green-600";

if(visited[i]) return "bg-red-600";

return "bg-slate-600";

}

function renderTest(){

visited[currentQuestion]=true;

const q=questions[currentQuestion];

document.getElementById("app").innerHTML=`

<div class="flex flex-col lg:flex-row h-screen">

<div class="flex-1 p-6 overflow-auto">

<div class="flex justify-between items-center sticky top-0 z-20 bg-slate-900 py-4">
<h2 class="font-bold text-xl">
Question ${currentQuestion+1}/${questions.length}
</h2>

<div id="timer"
class="bg-red-600 px-4 py-2 rounded font-bold">
${formatTime(remainingSeconds)}
</div>

</div>

<div class="mt-6 bg-slate-800 p-8 rounded-xl shadow-lg">
<div class="question-text text-lg font-medium">
    ${q.question}
</div>

<div class="mt-6 space-y-3">

${q.options.map(opt=>`

<div
onclick="selectAnswer('${opt.key}')"
class="question-option cursor-pointer rounded-xl p-4 text-lg
${answers[currentQuestion]===opt.key?'selected':''}">

<div class="flex gap-3 items-start">
    <span class="font-bold">${opt.key}.</span>
    <span>${opt.text}</span>
</div>

</div>

`).join("")}

</div>

</div>

<div class="flex flex-wrap gap-3 mt-6">

<button
onclick="prevQuestion()"
class="bg-slate-700 px-4 py-2 rounded">
Previous
</button>

<button
onclick="toggleReview()"
class="bg-purple-600 px-4 py-2 rounded">
${reviewMarked[currentQuestion]
?'Unmark Review'
:'Mark For Review'}
</button>

<button
onclick="nextQuestion()"
class="bg-blue-600 px-4 py-2 rounded">
Next
</button>

<button
onclick="submitTest()"
class="bg-red-600 px-4 py-2 rounded ml-auto">
Submit Test
</button>

</div>

</div>

<div class="w-full lg:w-80 bg-slate-800 p-4 overflow-auto">

<h3 class="font-bold mb-4">
Question Palette
</h3>

<div class="grid grid-cols-5 gap-2">

${questions.map((_,i)=>`

<button
onclick="jumpTo(${i})"
class="h-12 w-12 rounded-lg font-semibold text-white transition-all hover:scale-105"${navColor(i)}">

${i+1}

</button>

`).join("")}

</div>

<div class="mt-6 text-sm space-y-2">

<div>⬜ Unvisited</div>
<div class="text-red-400">■ Visited</div>
<div class="text-green-400">■ Answered</div>
<div class="text-purple-400">■ Review</div>

</div>

</div>

</div>
`;

}

function selectAnswer(ans){
answers[currentQuestion]=ans;
renderTest();
}

function toggleReview(){
reviewMarked[currentQuestion]=
!reviewMarked[currentQuestion];
renderTest();
}

function jumpTo(i){
currentQuestion=i;
renderTest();
}

function nextQuestion(){

if(currentQuestion<questions.length-1)
currentQuestion++;

renderTest();
}

function prevQuestion(){

if(currentQuestion>0)
currentQuestion--;

renderTest();
}

function submitTest(){

clearInterval(timerInterval);

let correct=0;
let incorrect=0;
let unattempted=0;

let topicStats={};

questions.forEach((q,index)=>{

if(!topicStats[q.topic]){

topicStats[q.topic]={
correct:0,
total:0
};

}

topicStats[q.topic].total++;

if(!answers[index]){
unattempted++;
return;
}

if(
answers[index]===q.correctAnswer
){
correct++;
topicStats[q.topic].correct++;
}
else{
incorrect++;
}

});

const score=correct;

const accuracy=
(correct/questions.length*100).toFixed(1);

document.getElementById("app").innerHTML=`

<div class="max-w-7xl mx-auto p-6">

<div class="flex justify-between flex-wrap gap-4">

<h1 class="text-3xl font-bold">
Performance Dashboard
</h1>

<button
onclick="landingPage()"
class="bg-blue-600 px-4 py-2 rounded">
Load New Questions
</button>

</div>

<div class="grid md:grid-cols-4 gap-4 mt-6">

<div class="bg-slate-800 p-5 rounded-xl">
<div class="text-slate-400">Score</div>
<div class="text-3xl font-bold">
${score}
</div>
</div>

<div class="bg-slate-800 p-5 rounded-xl">
<div class="text-slate-400">Accuracy</div>
<div class="text-3xl font-bold">
${accuracy}%
</div>
</div>

<div class="bg-slate-800 p-5 rounded-xl">
<div class="text-slate-400">Time Used</div>
<div class="text-3xl font-bold">
${formatTime(totalSeconds-remainingSeconds)}
</div>
</div>

<div class="bg-slate-800 p-5 rounded-xl">
<div class="text-slate-400">Questions</div>
<div class="text-3xl font-bold">
${questions.length}
</div>
</div>

</div>

<div class="grid md:grid-cols-3 gap-4 mt-6">

<div class="bg-green-700 p-5 rounded-xl">
Correct: ${correct}
</div>

<div class="bg-red-700 p-5 rounded-xl">
Incorrect: ${incorrect}
</div>

<div class="bg-slate-600 p-5 rounded-xl">
Unattempted: ${unattempted}
</div>

</div>

<div class="mt-8">

<h2 class="text-2xl font-bold mb-4">
Subject Analytics
</h2>

<div class="grid md:grid-cols-2 gap-4">

${Object.entries(topicStats).map(([topic,data])=>`

<div class="bg-slate-800 p-4 rounded-xl">

<div class="font-semibold">
${topic}
</div>

<div class="mt-2">
${data.correct}/${data.total}
</div>

<div class="w-full bg-slate-700 h-4 rounded mt-2">

<div
class="bg-green-500 h-4 rounded"
style="width:${(data.correct/data.total)*100}%">
</div>

</div>

</div>

`).join("")}

</div>

</div>

<div class="mt-10">

<h2 class="text-2xl font-bold mb-5">
Detailed Review
</h2>

<div class="space-y-6">

${questions.map((q,index)=>{

const user=answers[index];

const isCorrect=
user===q.correctAnswer;

return `

<div class="bg-slate-800 p-5 rounded-xl">

<div class="font-semibold mb-4">
Q${index+1}. ${q.question}
</div>

<div class="space-y-2">

${q.options.map(opt=>{

let cls="border border-slate-600";

if(opt.key===q.correctAnswer)
cls+=" correct";

if(
opt.key===user &&
user!==q.correctAnswer
)
cls+=" wrong";

return `

<div class="${cls} p-3 rounded">
<b>${opt.key}</b>. ${opt.text}
</div>

`;

}).join("")}

</div>

<div class="mt-4">

<div>
Your Answer:
<span class="${
isCorrect
?'text-green-400'
:'text-red-400'
}">
${user||"Not Attempted"}
</span>
</div>

<div>
Correct Answer:
<span class="text-green-400">
${q.correctAnswer}
</span>
</div>

</div>

<details class="mt-4">

<summary class="cursor-pointer text-blue-400">
View Detailed Explanation
</summary>

<div class="mt-3 bg-slate-900 p-4 rounded">
${q.explanation}
</div>

</details>

</div>

`;

}).join("")}

</div>

</div>

</div>
`;

}

landingPage();

</script>

</body>
</html>
